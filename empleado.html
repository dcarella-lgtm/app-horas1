<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Horas Extras - Detalle Empleado</title>
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS with Inter Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            },
          }
        }
      }
    </script>

    <!-- SheetJS (para exportación y carga) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="module" src="js/app.js" defer></script>
</head>
<body>
    <header>
        <h1>Control de Horas Extras</h1>
        <div class="header-right">
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="estadisticas.html">Estadísticas</a>
                <a href="configuracion.html">Configuración</a>
            </nav>
            <div class="header-actions">
                <div class="last-update-container">
                    <span>Última carga:</span>
                    <strong id="last-update-date">Cargando...</strong>
                </div>
                <label for="headerFileInput" class="label-header-upload">
                    <svg fill="currentColor" width="16" height="16" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg> 
                    Subir Excel
                </label>
                <input type="file" id="headerFileInput" accept=".xlsx,.xls,.xlsm" class="hidden-input" />
            </div>
        </div>
    </header>
    <main>
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="m-0 text-2xl font-bold text-gray-800">Detalle: <span id="empleado-legajo-title" class="text-blue-600">...</span></h2>
                <div class="mt-2 flex items-center gap-3">
                    <span id="empleado-estado-badge" class="text-xs uppercase font-extrabold rounded-md px-2 py-1"></span>
                    <span id="empleado-status-counters" class="text-gray-500 text-sm font-semibold"></span>
                </div>
            </div>
            <div class="flex gap-3">
                <button id="btn-aprobar-empleado" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-lg font-bold shadow-sm transition-all duration-150 ease-in-out flex items-center gap-2 hidden" style="display:none;">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Aprobar Reporte
                </button>
                <button onclick="window.history.back()" class="bg-white hover:bg-gray-50 text-gray-600 border border-gray-300 px-5 py-2.5 rounded-lg font-semibold shadow-sm transition-all duration-150 ease-in-out flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Volver
                </button>
            </div>
        </div>

        <div id="empleado-container">
            <!-- Estados -->
            <div id="emp-loading-state" class="hidden p-10 text-center text-gray-500" style="display: none;">
                <svg class="animate-spin h-8 w-8 text-blue-500 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Cargando datos del empleado...
            </div>
            <div id="emp-empty-state" class="hidden p-10 text-center text-gray-500 bg-white rounded-xl border border-dashed border-gray-300 shadow-sm" style="display: none;">
                No se encontró el legajo o el empleado no tiene registros.
            </div>
            <div id="emp-error-state" class="hidden p-5 bg-red-50 text-red-700 rounded-lg text-center border border-red-100 flex items-center justify-center gap-2" style="display: none;">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Ocurrió un error al cargar la información.
            </div>

            <!-- Contenedor Dinámico de Semanas (SaaS v3) -->
            <div id="emp-semanas-container" class="flex flex-col gap-8 mt-2">
                <!-- Se inyecta desde ui.js -->
            </div>
            
            <div id="emp-actions" class="hidden mt-8 text-right" style="display: none;">
                <button id="btn-guardar-empleado" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold shadow-md transition-all duration-150 ease-in-out inline-flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    Guardar Correcciones
                </button>
            </div>
        </div>
    </main>
</body>
</html>
