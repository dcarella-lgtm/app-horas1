<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Horas Extras - Detalle Empleado</title>
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS with Inter Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            },
          }
        }
      }
    </script>

    <!-- SheetJS (para exportación y carga) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="js/api.js" defer></script>
    <script src="js/config.js" defer></script>
    <script src="js/asignaciones.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/app.js" defer></script>
</head>
<body>
    <header class="bg-white sticky top-0 z-50 shadow-sm">
        <!-- Nivel superior: branding + acciones -->
        <div class="border-b border-slate-100 bg-white/95 backdrop-blur-md">
            <div class="max-w-7xl mx-auto px-6 h-14 flex justify-between items-center">
                <h1 class="text-base font-extrabold text-slate-800 tracking-tight">Control de Horas</h1>

                <div class="flex items-center gap-4">
                    <div class="text-[10px] text-right hidden sm:block">
                        <span class="text-slate-400 block uppercase font-bold tracking-widest">Última carga</span>
                        <strong id="last-update-date" class="text-slate-600">Cargando...</strong>
                    </div>
                    <label for="headerFileInput" class="bg-slate-800 hover:bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded-lg cursor-pointer transition-all shadow-sm flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Subir Excel
                    </label>
                    <input type="file" id="headerFileInput" accept=".xlsx,.xls,.xlsm" class="hidden" />
                </div>
            </div>
        </div>

        <!-- Nivel inferior: navegación -->
        <div class="bg-white border-b border-slate-100">
            <nav class="max-w-7xl mx-auto px-6 flex items-center h-10">
                <a href="index.html" class="nav-link px-4 h-full flex items-center text-sm font-medium text-slate-500 border-b-2 border-transparent hover:text-slate-700 hover:border-slate-300 transition-colors">
                    Dashboard
                </a>
                <a href="estadisticas.html" class="nav-link px-4 h-full flex items-center text-sm font-medium text-slate-500 border-b-2 border-transparent hover:text-slate-700 hover:border-slate-300 transition-colors">
                    Empleados
                </a>
                <a href="configuracion.html" class="nav-link px-4 h-full flex items-center text-sm font-medium text-slate-500 border-b-2 border-transparent hover:text-slate-700 hover:border-slate-300 transition-colors">
                    Configuración
                </a>
            </nav>
        </div>

        <!-- Banner Supervisor Global (Inyectado por app.js) -->
        <div id="supervisor-banner" class="bg-blue-600 text-white px-6 py-2 text-xs font-bold flex justify-between items-center" style="display: none;">
            <span><span class="opacity-75 uppercase tracking-tighter mr-2">Modo Supervisor</span> <span id="supervisor-name-banner" class="text-white">...</span></span>
            <button id="btn-salir-supervisor-global" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded transition-colors flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                Salir
            </button>
        </div>
    </header>
    <main class="max-w-7xl mx-auto p-4 md:p-6 animate-fade-in">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <div>
                <h2 class="m-0 text-xl md:text-2xl font-bold text-gray-800">Detalle: <span id="empleado-legajo-title" class="text-blue-600">...</span></h2>
                <div class="mt-2 flex flex-wrap items-center gap-3">
                    <span id="empleado-estado-badge" class="text-[10px] md:text-xs uppercase font-extrabold rounded-md px-2 py-1"></span>
                    <span id="empleado-status-counters" class="text-gray-500 text-xs md:text-sm font-semibold flex flex-wrap gap-2"></span>
                </div>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <button id="btn-aprobar-empleado" class="flex-1 md:flex-none bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-lg font-bold shadow-sm transition-all duration-150 ease-in-out flex items-center justify-center gap-2 hidden" style="display:none;">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Aprobar Reporte
                </button>
                <button onclick="window.history.back()" class="flex-1 md:flex-none bg-white hover:bg-gray-50 text-gray-600 border border-gray-300 px-5 py-2.5 rounded-lg font-semibold shadow-sm transition-all duration-150 ease-in-out flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Volver
                </button>
            </div>
        </div>

        <div id="empleado-container">
            <!-- Estados -->
            <div id="emp-loading-state" class="hidden p-10 text-center text-gray-500" style="display: none;">
                <svg class="animate-spin h-8 w-8 text-blue-500 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Cargando datos del empleado...
            </div>
            <div id="emp-empty-state" class="hidden p-10 text-center text-gray-500 bg-white rounded-xl border border-dashed border-gray-300 shadow-sm" style="display: none;">
                No se encontró el legajo o el empleado no tiene registros.
            </div>
            <div id="emp-error-state" class="hidden p-5 bg-red-50 text-red-700 rounded-lg text-center border border-red-100 flex items-center justify-center gap-2" style="display: none;">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Ocurrió un error al cargar la información.
            </div>

            <!-- Contenedor Dinámico de Semanas (SaaS v3) -->
            <div id="emp-semanas-container" class="flex flex-col gap-8 mt-2">
                <!-- Se inyecta desde ui.js -->
            </div>
            
            <div id="emp-actions" class="hidden mt-8 text-right" style="display: none;">
                <button id="btn-guardar-empleado" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold shadow-md transition-all duration-150 ease-in-out inline-flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    Guardar Correcciones
                </button>
            </div>
        </div>
    </main>
</body>
</html>
