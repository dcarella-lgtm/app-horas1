<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Horas Extras - Inicio</title>

    <link rel="stylesheet" href="css/styles.css">

    <!-- SheetJS (PRIMERO) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Supabase (SEGUNDO) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Tu app (ÚLTIMO) -->
    <script type="module" src="js/app.js" defer></script>
</head>
<body>
    <header>
        <h1>Control de Horas Extras</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="empleado.html">Empleado</a>
            <a href="configuracion.html">Configuración</a>
        </nav>
    </header>
    <main>
        <h2>Bienvenido</h2>
        <p>Sistema de gestión de horas extras.</p>

        <!-- Input para testear Excel -->
        <div class="upload-container">
            <label for="fileInput" class="btn-upload">
                <svg fill="currentColor" width="20" height="20" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg> 
                Subir archivo de horas
            </label>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.xlsm" class="hidden-input" />
            <div id="file-name-display" class="file-name-display">Ningún archivo seleccionado</div>
        </div>

        <script>
            // Pequeño script solo visual para la carga
            document.getElementById('fileInput').addEventListener('change', function(e) {
                const display = document.getElementById('file-name-display');
                if (e.target.files.length > 0) {
                    display.innerHTML = `<span style="color:#198754">✅ Archivo cargado: <strong>${e.target.files[0].name}</strong></span>`;
                } else {
                    display.innerText = "Ningún archivo seleccionado";
                }
            });
        </script>
    </main>
</body>
</html>
